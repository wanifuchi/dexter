<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finx</title>
  <style>
    :root {
      --bg: #F4F1EC;
      --bg-card: #FFFFFF;
      --bg-input: #EDE9E3;
      --bg-user: #2C2A26;
      --text: #2C2A26;
      --text-sub: #5C584F;
      --text-muted: #9C978D;
      --accent: #8B6F47;
      --accent-light: #F0E8DC;
      --green: #3A7D44;
      --red: #C04B2D;
      --border: #D6D1C9;
      --border-light: #E8E4DC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo-link {
      cursor: pointer;
      text-decoration: none;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    /* TOPに戻るボタン */
    .scroll-top-btn {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      font-size: 14px;
      line-height: 1;
    }
    .scroll-top-btn:hover {
      transform: scale(1.1);
    }
    .scroll-top-btn.visible {
      display: flex;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .nav-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .nav-btn:hover { background: var(--bg-input); color: var(--text); }
    .nav-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .status-text { font-size: 11px; color: var(--text-muted); }

    /* ページ切替 */
    .page { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .page.active { display: flex; }

    /* チャットページ */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
      text-align: center;
      padding: 40px;
    }

    .welcome h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .welcome p {
      color: var(--text-sub);
      font-size: 14px;
      max-width: 440px;
      line-height: 1.7;
    }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
      max-width: 560px;
      width: 100%;
    }

    .suggestion {
      padding: 12px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-sub);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      line-height: 1.4;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--text); background: var(--accent-light); }

    /* メッセージ */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }

    .msg-user { align-self: flex-end; }

    .msg-user .bubble {
      background: var(--bg-user);
      color: #fff;
      border-radius: 14px 14px 4px 14px;
      padding: 10px 16px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 70%;
      align-self: flex-end;
    }

    .msg-assistant .bubble {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.75;
      width: 100%;
    }

    .msg-assistant .bubble strong { color: var(--accent); font-weight: 600; }
    .msg-assistant .bubble code {
      background: var(--bg-input);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--text);
    }

    .tool-events { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }

    .tool-event {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      padding: 3px 6px;
    }

    .tool-event .tool-icon {
      width: 14px; height: 14px;
      border-radius: 3px;
      background: var(--bg-input);
      display: flex; align-items: center; justify-content: center;
      font-size: 8px;
      flex-shrink: 0;
    }

    .tool-event.running .tool-icon { background: var(--accent-light); color: var(--accent); }
    .tool-event.done .tool-icon { background: var(--accent-light); color: var(--green); }
    .tool-event.error .tool-icon { background: #fde8e8; color: var(--red); }

    .thinking {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      padding: 3px 6px;
      border-left: 2px solid var(--border);
      margin-bottom: 6px;
      max-height: 40px;
      overflow: hidden;
    }

    .loading {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .loading-dots { display: flex; gap: 4px; }
    .loading-dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .stats {
      display: flex; gap: 14px;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-light);
    }

    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #7A6140; }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; }

    .bubble table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
    }
    .bubble th, .bubble td {
      padding: 6px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    .bubble th {
      color: var(--text-sub);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* 履歴ページ */
    #history-page { padding: 20px; overflow-y: auto; }

    .history-header {
      max-width: 760px;
      margin: 0 auto 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-header h3 { font-size: 16px; font-weight: 600; }
    .clear-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 10px; font-size: 11px; color: var(--text-muted);
      cursor: pointer; font-family: inherit;
    }
    .clear-btn:hover { color: var(--red); border-color: var(--red); }

    .history-list {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .history-item:hover { border-color: var(--accent); }

    .history-item .h-query {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item .h-answer {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.5;
      max-height: 36px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .history-item .h-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 40px;
    }

    /* ポートフォリオページ */
    .portfolio-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .summary-card .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .summary-card .value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    .account-cards {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .account-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      flex: 1;
      min-width: 140px;
    }
    .account-card .acct-name {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .account-card .acct-value {
      font-size: 15px;
      font-weight: 600;
    }
    .account-card .acct-pnl {
      font-size: 12px;
      margin-top: 2px;
    }
    .positions-table-wrap {
      overflow-x: auto;
      margin-bottom: 20px;
    }
    .positions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .positions-table th {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 2px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }
    .positions-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .positions-table tr:hover { background: var(--bg-input); }
    .pnl-pos { color: #16a34a; }
    .pnl-neg { color: #dc2626; }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }
    .alerts-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .alert-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
    }
    .alert-item .alert-cond { color: var(--text-muted); }
    .portfolio-loading {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .suggestions { grid-template-columns: 1fr; }
      .msg-user .bubble { max-width: 85%; }
      #messages { padding: 12px; }
      .input-area { padding: 12px; }
      .summary-cards { grid-template-columns: repeat(2, 1fr); }
      .account-cards { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <a class="logo-link" onclick="scrollToTop()"><span class="logo-text">Finx</span></a>
  </div>
  <div class="header-right">
    <button class="nav-btn active" onclick="showPage('chat')" id="nav-chat">チャット</button>
    <button class="nav-btn" onclick="showPage('history')" id="nav-history">履歴</button>
    <button class="nav-btn" onclick="showPage('portfolio')" id="nav-portfolio">ポートフォリオ</button>
    <span class="status-text" id="model-name"></span>
  </div>
</header>

<!-- チャットページ -->
<div class="page active" id="chat-page">
  <div id="messages">
    <div class="welcome" id="welcome">
      <h2>何を調べますか？</h2>
      <p>銘柄分析、スクリーニング、財務比較など。<br>日本株・米国株どちらも対応しています。</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">NVIDIAの最新の財務状況を分析して</div>
        <div class="suggestion" onclick="sendSuggestion(this)">トヨタ(7203)の財務分析をして</div>
        <div class="suggestion" onclick="sendSuggestion(this)">ROE15%以上、配当利回り3%以上の日本株を探して</div>
        <div class="suggestion" onclick="sendSuggestion(this)">PER20以下の割安な米国テクノロジー株をスクリーニング</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="input" rows="1" placeholder="質問を入力 (Shift+Enterで送信)" autofocus></textarea>
      <button type="button" id="send-btn" title="送信" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- TOPに戻るボタン -->
<button type="button" class="scroll-top-btn" id="scroll-top-btn" onclick="scrollToTop()" title="TOPに戻る">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M12 19V5M5 12l7-7 7 7"/>
  </svg>
</button>

<!-- 履歴ページ -->
<div class="page" id="history-page">
  <div class="history-header">
    <h3>チャット履歴</h3>
    <button class="clear-btn" onclick="clearHistory()">すべて削除</button>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<!-- ポートフォリオページ -->
<div class="page" id="portfolio-page">
  <div class="portfolio-container" id="portfolio-container">
    <div class="portfolio-loading" id="portfolio-loading">読み込み中...</div>
    <div id="portfolio-content" style="display:none">
      <div class="summary-cards" id="summary-cards"></div>
      <div class="section-title">口座別</div>
      <div class="account-cards" id="account-cards"></div>
      <div class="section-title">ポジション</div>
      <div class="positions-table-wrap">
        <table class="positions-table">
          <thead>
            <tr>
              <th>銘柄</th>
              <th>名称</th>
              <th>株数</th>
              <th>取得単価</th>
              <th>現在値</th>
              <th>時価</th>
              <th>損益</th>
              <th>損益率</th>
              <th>日次</th>
              <th>口座</th>
            </tr>
          </thead>
          <tbody id="positions-body"></tbody>
        </table>
      </div>
      <div class="section-title">アラートルール</div>
      <div class="alerts-list" id="alerts-list"></div>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const welcomeEl = document.getElementById('welcome');
  const modelNameEl = document.getElementById('model-name');

  let isProcessing = false;
  let sessionId = 'web-' + Date.now().toString(36);

  // ヘルスチェック
  fetch('/api/health')
    .then(r => r.json())
    .then(d => { modelNameEl.textContent = d.model; })
    .catch(() => { modelNameEl.textContent = 'offline'; });

  // ページ切替
  function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(page + '-page').classList.add('active');
    document.getElementById('nav-' + page).classList.add('active');
    if (page === 'history') renderHistory();
    if (page === 'portfolio') loadPortfolioPage();
  }

  // テキストエリア自動リサイズ
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Shift+Enter送信 (Enterで改行)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(el) {
    inputEl.value = el.textContent;
    sendMessage();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // TOPに戻る
  function scrollToTop() {
    showPage('chat');
    messagesEl.scrollTop = 0;
  }

  // スクロール量に応じてTOPボタンの��示/非表示
  const scrollTopBtn = document.getElementById('scroll-top-btn');
  messagesEl.addEventListener('scroll', () => {
    if (messagesEl.scrollTop > 300) {
      scrollTopBtn.classList.add('visible');
    } else {
      scrollTopBtn.classList.remove('visible');
    }
  });

  // --- 履歴管理 (localStorage) ---
  function getHistory() {
    try { return JSON.parse(localStorage.getItem('finx_history') || '[]'); }
    catch { return []; }
  }

  function saveToHistory(query, answer, stats) {
    const history = getHistory();
    history.unshift({
      id: Date.now(),
      query,
      answer,
      stats,
      date: new Date().toISOString(),
    });
    // 最大100件
    if (history.length > 100) history.length = 100;
    localStorage.setItem('finx_history', JSON.stringify(history));
  }

  function clearHistory() {
    if (confirm('履歴をすべて削除しますか？')) {
      localStorage.removeItem('finx_history');
      renderHistory();
    }
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    const history = getHistory();
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">履歴はまだありません</div>';
      return;
    }
    list.innerHTML = history.map(item => {
      const date = new Date(item.date);
      const dateStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
      const statsStr = item.stats ? `${item.stats.time}秒 / ${item.stats.cost}` : '';
      const plain = (item.answer || '').replace(/\*\*/g, '').replace(/[|#\-]/g, ' ').trim();
      return `<div class="history-item" onclick="loadHistory(${item.id})">
        <div class="h-query">${escapeHtml(item.query)}</div>
        <div class="h-answer">${escapeHtml(plain.slice(0, 200))}</div>
        <div class="h-meta">${dateStr}${statsStr ? ' · ' + statsStr : ''}</div>
      </div>`;
    }).join('');
  }

  function loadHistory(id) {
    const item = getHistory().find(h => h.id === id);
    if (!item) return;
    showPage('chat');
    if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();

    const userMsg = document.createElement('div');
    userMsg.className = 'msg msg-user';
    userMsg.innerHTML = `<div class="bubble">${escapeHtml(item.query)}</div>`;
    messagesEl.appendChild(userMsg);

    const assistantMsg = document.createElement('div');
    assistantMsg.className = 'msg msg-assistant';
    const bubbleEl = document.createElement('div');
    bubbleEl.className = 'bubble';
    bubbleEl.innerHTML = renderMarkdown(item.answer);
    assistantMsg.appendChild(bubbleEl);
    messagesEl.appendChild(assistantMsg);
    scrollToBottom();
  }

  // マークダウン簡易パーサー
  function renderMarkdown(text) {
    if (!text) return '';
    return text
      .replace(/^\|(.+)\|\s*\n\|[-:|  ]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (_, header, rows) => {
        const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const trs = rows.trim().split('\n').map(row => {
          const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
      })
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/^[-•] (.+)/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const query = inputEl.value.trim();
    if (!query || isProcessing) return;

    isProcessing = true;
    sendBtn.disabled = true;

    if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();

    const userMsg = document.createElement('div');
    userMsg.className = 'msg msg-user';
    userMsg.innerHTML = `<div class="bubble">${escapeHtml(query)}</div>`;
    messagesEl.appendChild(userMsg);

    inputEl.value = '';
    inputEl.style.height = 'auto';
    scrollToBottom();

    const assistantMsg = document.createElement('div');
    assistantMsg.className = 'msg msg-assistant';

    const toolEventsEl = document.createElement('div');
    toolEventsEl.className = 'tool-events';

    const bubbleEl = document.createElement('div');
    bubbleEl.className = 'bubble';

    const loadingEl = document.createElement('div');
    loadingEl.className = 'loading';
    loadingEl.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div><span>分析中...</span>';

    assistantMsg.appendChild(toolEventsEl);
    assistantMsg.appendChild(loadingEl);
    assistantMsg.appendChild(bubbleEl);
    messagesEl.appendChild(assistantMsg);
    bubbleEl.style.display = 'none';
    scrollToBottom();

    let lastAnswer = '';
    let lastStats = null;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, sessionId }),
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        let eventType = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) {
            eventType = line.slice(7);
          } else if (line.startsWith('data: ') && eventType) {
            try {
              const data = JSON.parse(line.slice(6));
              const result = handleEvent(eventType, data, toolEventsEl, bubbleEl, loadingEl);
              if (result) { lastAnswer = result.answer; lastStats = result.stats; }
            } catch {}
            eventType = '';
          }
        }
        scrollToBottom();
      }
    } catch (error) {
      loadingEl.remove();
      bubbleEl.style.display = 'block';
      bubbleEl.innerHTML = `<span style="color: var(--red)">エラー: ${escapeHtml(error.message)}</span>`;
    }

    // 履歴に保存
    if (lastAnswer) saveToHistory(query, lastAnswer, lastStats);

    isProcessing = false;
    sendBtn.disabled = false;
    inputEl.focus();
    scrollToBottom();
  }

  function handleEvent(type, data, toolEventsEl, bubbleEl, loadingEl) {
    switch (type) {
      case 'thinking': {
        let thinkEl = toolEventsEl.querySelector('.thinking');
        if (!thinkEl) {
          thinkEl = document.createElement('div');
          thinkEl.className = 'thinking';
          toolEventsEl.appendChild(thinkEl);
        }
        thinkEl.textContent = data.message.length > 120 ? data.message.slice(0, 120) + '...' : data.message;
        return null;
      }
      case 'tool_start': {
        const el = document.createElement('div');
        el.className = 'tool-event running';
        el.dataset.tool = data.tool;
        const argsStr = formatToolArgs(data.tool, data.args);
        el.innerHTML = `<span class="tool-icon">&#9679;</span><span>${getToolNameJa(data.tool)}</span><span style="color:var(--text-muted)">${argsStr}</span>`;
        toolEventsEl.appendChild(el);
        return null;
      }
      case 'tool_end': {
        const els = toolEventsEl.querySelectorAll(`.tool-event.running[data-tool="${data.tool}"]`);
        const el = els[els.length - 1];
        if (el) {
          el.className = 'tool-event done';
          el.querySelector('.tool-icon').innerHTML = '&#10003;';
          if (data.duration) {
            const secs = (data.duration / 1000).toFixed(1);
            el.innerHTML += `<span style="color:var(--text-muted)">${secs}s</span>`;
          }
        }
        return null;
      }
      case 'tool_error': {
        const els = toolEventsEl.querySelectorAll(`.tool-event.running[data-tool="${data.tool}"]`);
        const el = els[els.length - 1];
        if (el) {
          el.className = 'tool-event error';
          el.querySelector('.tool-icon').innerHTML = '&#10007;';
        }
        return null;
      }
      case 'done': {
        loadingEl.remove();
        bubbleEl.style.display = 'block';
        bubbleEl.innerHTML = renderMarkdown(data.answer);

        let statsInfo = null;
        if (data.totalTime || data.iterations) {
          const statsEl = document.createElement('div');
          statsEl.className = 'stats';
          const secs = data.totalTime ? (data.totalTime / 1000).toFixed(1) : '?';
          statsEl.innerHTML = `<span>${secs}秒</span><span>${data.iterations ?? '?'}ステップ</span>`;
          if (data.tokenUsage) {
            const total = (data.tokenUsage.totalTokens || 0).toLocaleString();
            const inp = data.tokenUsage.inputTokens || 0;
            const out = data.tokenUsage.outputTokens || 0;
            const costUsd = (inp * 2.5 / 1_000_000) + (out * 10.0 / 1_000_000);
            const costDisplay = costUsd < 0.01 ? '<$0.01' : '$' + costUsd.toFixed(2);
            statsEl.innerHTML += `<span>${total} tok</span><span>${costDisplay}</span>`;
            statsInfo = { time: secs, cost: costDisplay };
          }
          bubbleEl.appendChild(statsEl);
        }
        return { answer: data.answer, stats: statsInfo };
      }
      case 'error': {
        loadingEl.remove();
        bubbleEl.style.display = 'block';
        bubbleEl.innerHTML = `<span style="color: var(--red)">エラー: ${escapeHtml(data.message)}</span>`;
        return null;
      }
    }
    return null;
  }

  function getToolNameJa(tool) { return TOOL_NAMES_JA[tool] || tool; }

  function formatToolArgs(tool, args) {
    if (!args) return '';
    if (args.query) return `"${args.query.slice(0, 40)}${args.query.length > 40 ? '...' : ''}"`;
    if (args.tickers) return args.tickers;
    if (args.ticker) return args.ticker;
    return '';
  }

  function escapeHtml(text) {
    const el = document.createElement('span');
    el.textContent = text;
    return el.innerHTML;
  }

  // --- ポートフォリオページ ---
  const accountLabels = {
    'sbi-nisa': 'SBI NISA',
    'sbi-tokutei': 'SBI 特定',
    'rakuten-nisa': '楽天 NISA',
    'rakuten-tokutei': '楽天 特定',
  };

  let portfolioUsdJpy = 150;
  function fmtUsd(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtJpy(n) { return '¥' + Math.round(n).toLocaleString('ja-JP'); }
  function fmtBoth(usd) { return fmtUsd(usd) + ' <span style="color:var(--text-muted);font-size:0.8em">(' + fmtJpy(usd * portfolioUsdJpy) + ')</span>'; }
  function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(2) + '%'; }
  function pnlClass(n) { return n >= 0 ? 'pnl-pos' : 'pnl-neg'; }

  async function loadPortfolioPage() {
    const loading = document.getElementById('portfolio-loading');
    const content = document.getElementById('portfolio-content');
    loading.style.display = 'block';
    content.style.display = 'none';

    try {
      const res = await fetch('/api/portfolio');
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderPortfolio(data);
      loading.style.display = 'none';
      content.style.display = 'block';
    } catch (e) {
      loading.textContent = 'ポートフォリオの読み込みに失敗しました: ' + e.message;
    }
  }

  function renderPortfolio(data) {
    portfolioUsdJpy = data.usdJpy || 150;

    // サマリーカード
    const s = data.summary;
    document.getElementById('summary-cards').innerHTML = `
      <div class="summary-card">
        <div class="label">時価総額</div>
        <div class="value">${fmtJpy(s.totalValue * portfolioUsdJpy)}</div>
        <div style="font-size:12px;color:var(--text-muted)">${fmtUsd(s.totalValue)}</div>
      </div>
      <div class="summary-card">
        <div class="label">投資元本</div>
        <div class="value">${fmtJpy(s.totalCost * portfolioUsdJpy)}</div>
        <div style="font-size:12px;color:var(--text-muted)">${fmtUsd(s.totalCost)}</div>
      </div>
      <div class="summary-card">
        <div class="label">含み損益</div>
        <div class="value ${pnlClass(s.totalPnl)}">${fmtJpy(s.totalPnl * portfolioUsdJpy)}</div>
        <div style="font-size:12px" class="${pnlClass(s.totalPnl)}">${fmtUsd(s.totalPnl)}</div>
      </div>
      <div class="summary-card">
        <div class="label">損益率</div>
        <div class="value ${pnlClass(s.totalPnlPct)}">${fmtPct(s.totalPnlPct)}</div>
        <div style="font-size:12px;color:var(--text-muted)">$1 = ¥${portfolioUsdJpy.toFixed(2)}</div>
      </div>
    `;

    // 口座別カード
    const acctHtml = Object.entries(data.accountSummary).map(([key, a]) => {
      const pnl = a.value - a.cost;
      const pnlPct = a.cost > 0 ? (pnl / a.cost) * 100 : 0;
      return `
        <div class="account-card">
          <div class="acct-name">${accountLabels[key] || key}（${a.count}銘柄）</div>
          <div class="acct-value">${fmtJpy(a.value * portfolioUsdJpy)}</div>
          <div class="acct-pnl ${pnlClass(pnl)}">${fmtJpy(pnl * portfolioUsdJpy)} (${fmtPct(pnlPct)})</div>
        </div>
      `;
    }).join('');
    document.getElementById('account-cards').innerHTML = acctHtml;

    // ポジションテーブル
    const rows = data.positions.map(p => {
      const price = p.currentPrice !== null ? fmtUsd(p.currentPrice) : '-';
      const mv = p.marketValue !== null ? `${fmtUsd(p.marketValue)}<br><span style="color:var(--text-muted);font-size:11px">${fmtJpy(p.marketValue * portfolioUsdJpy)}</span>` : '-';
      const pnl = p.pnl !== null ? `<span class="${pnlClass(p.pnl)}">${fmtUsd(p.pnl)}<br><span style="font-size:11px">${fmtJpy(p.pnl * portfolioUsdJpy)}</span></span>` : '-';
      const pnlPct = p.pnlPct !== null ? `<span class="${pnlClass(p.pnlPct)}">${fmtPct(p.pnlPct)}</span>` : '-';
      const day = p.dayChange !== null ? `<span class="${pnlClass(p.dayChange)}">${fmtPct(p.dayChange)}</span>` : '-';
      return `<tr>
        <td><strong>${p.ticker}</strong></td>
        <td>${escapeHtml(p.name)}</td>
        <td>${p.shares.toLocaleString()}</td>
        <td>${fmtUsd(p.avgCost)}</td>
        <td>${price}</td>
        <td>${mv}</td>
        <td>${pnl}</td>
        <td>${pnlPct}</td>
        <td>${day}</td>
        <td>${accountLabels[p.account] || p.account}</td>
      </tr>`;
    }).join('');
    document.getElementById('positions-body').innerHTML = rows;

    // アラートルール
    const condLabels = {
      price_above: '上抜け', price_below: '下抜け',
      dividend_yield_above: '配当利回り超', per_below: 'PER割れ',
      pbr_below: 'PBR割れ', change_pct_above: '上昇率超', change_pct_below: '下落率超',
    };
    const alertsHtml = data.alerts.filter(a => a.enabled).map(a => `
      <div class="alert-item">
        <span><strong>${a.ticker}</strong> ${a.name || ''}</span>
        <span class="alert-cond">${condLabels[a.condition] || a.condition} ${a.threshold}</span>
      </div>
    `).join('');
    document.getElementById('alerts-list').innerHTML = alertsHtml || '<div class="portfolio-loading">アラートルールなし</div>';
  }
