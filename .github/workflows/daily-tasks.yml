name: Daily Tasks

on:
  schedule:
    # 毎朝 UTC 21:00 (JST 翌6:00) — 経済指標・決算予定チェック（平日の米国市場クローズ後）
    - cron: '0 21 * * 0-4'
    # 毎週土曜 UTC 21:00 (JST 日曜6:00) — 週次レポート
    - cron: '0 21 * * 6'
  workflow_dispatch:

jobs:
  earnings-check:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 21 * * 0-4' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 2
    steps:
      - name: Check upcoming earnings
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.FINX_URL }}/api/cron/earnings-calendar")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]
        env:
          FINX_URL: ${{ secrets.FINX_URL }}

  economic-alerts:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 21 * * 0-4' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 2
    steps:
      - name: Check economic indicators (real data from Finnhub)
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.FINX_URL }}/api/cron/economic-alerts")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]
        env:
          FINX_URL: ${{ secrets.FINX_URL }}

  weekly-report:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 21 * * 6' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 2
    steps:
      - name: Send weekly report
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.FINX_URL }}/api/cron/weekly-report")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP $HTTP_CODE"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]
        env:
          FINX_URL: ${{ secrets.FINX_URL }}
